name: Release Charts
concurrency: release-charts
on:
  push:
    branches:
      - main
    paths:
      - "charts/**"

jobs:
  release:
    name: Release Charts
    runs-on: ubuntu-latest
    steps:
      # checkout
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      # setup helm
      - uses: azure/setup-helm@v5.0.1
        with:
          version: v4.2.2

      # setup taskfile
      - uses: arduino/setup-task@v2.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # setup cache for social cards
      - uses: actions/cache@v6
        with:
          key: ${{ github.ref }}
          path: .cache

      # configure git
      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      # package changed charts
      - name: Package changed charts
        id: package
        shell: bash
        run: |
          mkdir -p .cr-release-packages
          null_sha="0000000000000000000000000000000000000000"
          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          if [ "$before" = "$null_sha" ]; then
            changed_files=$(git ls-tree -r --name-only "$after" -- charts/)
          else
            changed_files=$(git diff --name-only "$before" "$after" -- charts/)
          fi

          if [ -z "$changed_files" ]; then
            echo "changed_charts=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          chart_dirs=$(printf "%s\n" "$changed_files" | awk -F/ '/^charts\/[^/]+\// { print $1 "/" $2 }' | sort -u)
          changed_charts='false'
          while IFS= read -r chart_dir; do
            [ -z "$chart_dir" ] && continue
            [ ! -f "$chart_dir/Chart.yaml" ] && continue
            helm package --dependency-update "$chart_dir" --destination .cr-release-packages
            changed_charts='true'
          done <<< "$chart_dirs"

          echo "changed_charts=$changed_charts" >> "$GITHUB_OUTPUT"

      # setup access to container registry
      - uses: docker/login-action@v3
        if: ${{ steps.package.outputs.changed_charts == 'true' }}
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # push charts to container registry
      - name: Push charts to container registry
        if: ${{ steps.package.outputs.changed_charts == 'true' }}
        run: |
          for CHART in .cr-release-packages/*; do
            if [ -z "${CHART:-}" ]; then break; fi
            helm push "${CHART}" oci://ghcr.io/${{ github.repository }}
          done

      # create pages for docs
      - name: Create pages for docs
        run: task docs
        env:
          PROD_DOMAIN: ${{ secrets.PROD_DOMAIN }}

      # deploy docs
      - uses: mhausenblas/mkdocs-deploy-gh-pages@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUIREMENTS: docs/requirements.txt
