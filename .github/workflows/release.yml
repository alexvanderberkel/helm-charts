name: Release Charts
concurrency: release-charts
on:
  push:
    branches:
      - main
    paths:
      - "charts/**"

# creating GitHub releases and deploying to the gh-pages branch need write
# access to contents; pushing chart packages to ghcr.io needs packages write
permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release Charts
    runs-on: ubuntu-latest
    steps:
      # checkout
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      # setup helm
      - uses: azure/setup-helm@v5.0.1
        with:
          version: v4.2.3

      # setup taskfile
      - uses: arduino/setup-task@v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # setup cache for social cards
      - uses: actions/cache@v6
        with:
          key: ${{ github.ref }}
          path: .cache

      # configure git
      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      # package changed charts
      - name: Package changed charts
        id: package
        shell: bash
        run: |
          mkdir -p .cr-release-packages
          # git's null SHA is sent as github.event.before on the first push to a branch
          null_sha="0000000000000000000000000000000000000000"
          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          if [ "$before" = "$null_sha" ]; then
            # first push: treat all charts as changed
            changed_files=$(git ls-tree -r --name-only "$after" -- charts/)
          else
            changed_files=$(git diff --name-only "$before" "$after" -- charts/)
          fi

          if [ -z "$changed_files" ]; then
            echo "changed_charts=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # extract unique chart roots (charts/<name>) from changed file paths
          chart_dirs=$(printf "%s\n" "$changed_files" | awk -F/ '/^charts\/[^/]+\// { print $1 "/" $2 }' | sort -u)
          changed_charts='false'
          while IFS= read -r chart_dir; do
            [ -z "$chart_dir" ] && continue
            [ ! -f "$chart_dir/Chart.yaml" ] && continue
            helm package --dependency-update "$chart_dir" --destination .cr-release-packages
            changed_charts='true'
          done <<< "$chart_dirs"

          echo "changed_charts=$changed_charts" >> "$GITHUB_OUTPUT"

      # setup access to container registry
      - uses: docker/login-action@v3
        if: ${{ steps.package.outputs.changed_charts == 'true' }}
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # push charts to container registry
      - name: Push charts to container registry
        if: ${{ steps.package.outputs.changed_charts == 'true' }}
        run: |
          for CHART in .cr-release-packages/*; do
            if [ -z "${CHART:-}" ]; then break; fi
            helm push "${CHART}" oci://ghcr.io/${{ github.repository }}
          done

      # create a github release per packaged chart and attach the package as an
      # asset. to stay compatible with repositories that have "immutable
      # releases" enabled, the release is created as a draft (mutable), the
      # asset is uploaded, and only then is the release published.
      - name: Create GitHub releases
        if: ${{ steps.package.outputs.changed_charts == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          for pkg in .cr-release-packages/*.tgz; do
            base="$(basename "$pkg" .tgz)"
            if gh release view "$base" >/dev/null 2>&1; then
              echo "Release ${base} already exists; skipping."
              continue
            fi
            echo "Creating release ${base}..."
            gh release create "$base" "$pkg" \
              --title "$base" \
              --target "$GITHUB_SHA" \
              --generate-notes \
              --draft
            gh release edit "$base" --draft=false --latest
          done

      # (re)generate the helm repo index that is served over HTTP at the pages
      # site. the currently published index is used as the merge base so that
      # existing chart versions are preserved, and download urls point at the
      # matching github release assets. the resulting index is picked up and
      # published to docs/index.yaml by the "Create pages for docs" step below.
      - name: Update Helm repo index
        if: ${{ steps.package.outputs.changed_charts == 'true' }}
        env:
          PROD_DOMAIN: ${{ secrets.PROD_DOMAIN }}
        run: |
          mkdir -p .cr-index
          # seed with the currently published index so existing versions persist
          # (ignore failure on the very first run when nothing is published yet)
          curl -fsSL "https://${PROD_DOMAIN}/index.yaml" -o .cr-index/index.yaml || rm -f .cr-index/index.yaml
          for pkg in .cr-release-packages/*.tgz; do
            base="$(basename "$pkg" .tgz)"
            url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${base}"
            work="$(mktemp -d)"
            cp "$pkg" "$work/"
            if [ -s .cr-index/index.yaml ]; then
              helm repo index "$work" --url "$url" --merge .cr-index/index.yaml
            else
              helm repo index "$work" --url "$url"
            fi
            cp "$work/index.yaml" .cr-index/index.yaml
            rm -rf "$work"
          done

      # create pages for docs
      - name: Create pages for docs
        run: task docs
        env:
          PROD_DOMAIN: ${{ secrets.PROD_DOMAIN }}

      # deploy docs
      - uses: mhausenblas/mkdocs-deploy-gh-pages@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUIREMENTS: docs/requirements.txt
