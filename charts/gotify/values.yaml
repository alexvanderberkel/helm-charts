# This chart inherits from the bjw-s common library chart (v4).
# https://github.com/bjw-s-labs/helm-charts/tree/main/charts/library/common
#

controllers:
  main:
    containers:
      main:
        image:
          # -- image repository
          repository: ghcr.io/gotify/server
          # -- image pull policy
          pullPolicy: IfNotPresent
          # -- image tag
          tag: 2.8.0

        # -- Environment variables. [[ref]](https://gotify.net/docs/config#environment-variables)
        # @default -- See [values.yaml](./values.yaml)
        env:
          # -- Set the container timezone
          TZ: UTC
          # -- Default admin username
          GOTIFY_DEFAULTUSER_NAME: admin
          # -- Default admin password
          GOTIFY_DEFAULTUSER_PASS: admin
          # -- Allow registration
          GOTIFY_REGISTRATION: "false"

        securityContext:
          # -- Run as `nobody` user
          runAsUser: 65534
          # -- Run as `nobody` group
          runAsGroup: 65534

defaultPodOptions:
  securityContext:
    # -- Volume binds will be granted to `nobody` group
    fsGroup: 65534

# -- Configures service settings for the chart.
# @default -- See [values.yaml](./values.yaml)
service:
  main:
    controller: main
    ports:
      http:
        port: 80

ingress:
  # -- Enable and configure ingress settings for the chart under this key.
  # @default -- See [values.yaml](./values.yaml)
  main:
    enabled: false
    # hosts:
    #   - host: chart-example.local
    #     paths:
    #       - path: /
    # tls:
    #   - secretName: chart-example.local
    #     hosts:
    #       - chart-example.local

# -- Configure persistence settings for the chart under this key.
# @default -- See [values.yaml](./values.yaml)
persistence:
  data:
    enabled: false
    globalMounts:
      - path: /app/data
    retain: true
    # storageClass: ""
    # accessMode: ReadWriteOnce
    # size: 1Gi

